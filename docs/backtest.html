<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#070b14">
<title>أداء الاستراتيجية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#060910;--bg1:#0a0f1c;--glass:rgba(255,255,255,.04);--br:rgba(255,255,255,.10);
    --br2:rgba(255,255,255,.16);--text:#f0f4fc;--muted:#94a2be;--dim:#5a6684;
    --up:#0fd18f;--up2:rgba(15,209,143,.14);--down:#fb5573;--down2:rgba(251,85,115,.14);
    --gold:#ffc93c;--accent:#5b8dff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1000px 520px at 88% -12%,rgba(91,141,255,.15),transparent 62%),
       linear-gradient(162deg,var(--bg0),var(--bg1) 70%);background-attachment:fixed;
       min-height:100vh;color:var(--text);font-family:"Tajawal",Tahoma,sans-serif;
       padding:clamp(12px,2.6vw,26px);padding-bottom:60px}
  a.back{display:inline-block;color:var(--accent);text-decoration:none;font-size:13px;
         margin-bottom:14px;font-weight:700}
  h1{font-size:clamp(19px,3.6vw,26px);font-weight:900;margin-bottom:5px}
  h1 em{font-style:normal;background:linear-gradient(95deg,#7fb0ff,#3ee8bb);
        -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:18px;line-height:1.8}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:10px;margin-bottom:14px}
  .stat{background:var(--glass);border:1px solid var(--br);border-radius:15px;padding:14px 16px}
  .stat b{font-size:25px;font-weight:900;font-variant-numeric:tabular-nums;direction:ltr;display:block}
  .stat small{color:var(--muted);font-size:11.5px;display:block;margin-top:3px}
  .warn{background:linear-gradient(150deg,rgba(255,201,60,.13),rgba(255,201,60,.04));
        border:1px solid rgba(255,201,60,.35);border-radius:15px;padding:15px 17px;
        font-size:12.8px;line-height:1.95;margin-bottom:20px}
  .warn h3{font-size:13.5px;color:var(--gold);margin-bottom:7px}
  .sec{font-size:13px;font-weight:800;color:var(--muted);margin:22px 0 10px;
       display:flex;align-items:center;gap:8px}
  .sec::after{content:"";flex:1;height:1px;background:var(--br)}
  .wrap{overflow-x:auto;border:1px solid var(--br);border-radius:16px;background:var(--glass)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:520px}
  th{background:rgba(255,255,255,.05);padding:11px 13px;text-align:right;
     font-weight:800;color:var(--muted);font-size:11.5px;white-space:nowrap;position:sticky;top:0}
  td{padding:10px 13px;border-top:1px solid var(--br);font-variant-numeric:tabular-nums}
  tr:hover td{background:rgba(255,255,255,.028)}
  .tk{font-weight:900;direction:ltr;font-size:13.5px}
  .pos{color:var(--up);font-weight:800}.neg{color:var(--down);font-weight:800}
  .bar{height:6px;border-radius:3px;background:rgba(255,255,255,.09);overflow:hidden;min-width:52px}
  .bar i{display:block;height:100%;background:var(--accent);border-radius:3px}
  .muted{color:var(--dim);font-size:11px}
  .toggle{background:var(--glass);border:1px solid var(--br);color:var(--muted);
          border-radius:999px;padding:7px 15px;font-size:12px;font-weight:700;
          font-family:inherit;cursor:pointer;margin-bottom:10px}
  .toggle:hover{border-color:var(--br2);color:var(--text)}
  footer{margin-top:28px;padding-top:14px;border-top:1px solid var(--br);
         font-size:11.5px;color:var(--dim);line-height:1.9;text-align:center}
  @media(max-width:560px){.stat b{font-size:21px}}
</style>
</head>
<body>

<a class="back" href="index.html">← رجوع للوحة الفرص</a>
<h1>📉 <em>أداء الاستراتيجية تاريخياً</em></h1>
<div class="sub" id="sub">جاري التحميل…</div>

<div id="body"></div>

<footer>
  الأرقام وصفية لما حدث في الماضي فقط، ولا تضمن تكرار النتيجة.<br>
  ⚠️ ليست توصية استثمارية — القرار والمسؤولية عليك
</footer>

<script>
"use strict";
const pct = n => (n>=0?"+":"")+Number(n).toFixed(2)+"%";
const cls = n => n>=0?"pos":"neg";
let D=null, showAll=false;

fetch("backtest.json?v="+Date.now(),{cache:"no-store"})
  .then(r=>r.json()).then(d=>{D=d;draw();})
  .catch(()=>{document.getElementById("sub").textContent="⚠️ لا يوجد تقرير بعد — شغّل: python backtest.py";});

function draw(){
  const o=D.overall;
  document.getElementById("sub").innerHTML =
    `${D.sessions} جلسة تداول (${D.date_from} → ${D.date_to}) · ${o.trades.toLocaleString()} صفقة · ` +
    `آخر تحديث ${D.generated_amman} بتوقيت الأردن`;

  const reliable = D.by_ticker.filter(r=>r.reliable);
  const good = reliable.filter(r=>r.expectancy>0).length;

  document.getElementById("body").innerHTML = `
    <div class="stats">
      <div class="stat"><b>${o.trades.toLocaleString()}</b><small>إجمالي الصفقات</small></div>
      <div class="stat"><b>${o.win_rate}%</b><small>نسبة الصفقات الرابحة</small></div>
      <div class="stat"><b class="pos">${pct(o.avg_win)}</b><small>متوسط الصفقة الرابحة</small></div>
      <div class="stat"><b class="neg">${pct(o.avg_loss)}</b><small>متوسط الصفقة الخاسرة</small></div>
      <div class="stat"><b class="${cls(o.expectancy)}">${o.expectancy>=0?"+":""}${o.expectancy.toFixed(3)}%</b>
        <small>التوقع لكل صفقة</small></div>
      <div class="stat"><b>${good}/${reliable.length}</b><small>أسهم بتوقع موجب</small></div>
    </div>

    <div class="warn">
      <h3>📌 اقرأ هذا قبل تفسير الأرقام</h3>
      • الخروج هنا يتم <b>فقط</b> عند إشارة البيع في الاستراتيجية أو عند إغلاق الجلسة —
        <b>لم يتم جني الأرباح عند الأهداف</b>. لو خرجت عند هدف، النتيجة تختلف تماماً.<br>
      • الأرقام <b>لا تشمل العمولات ولا فروق السعر (السبريد) ولا الانزلاق</b>، وهي تقتطع من النتيجة فعلياً.<br>
      • تعتمد على بيانات 5 دقائق من ياهو، وقد تختلف قليلاً عن منصتك.<br>
      • عيّنة ${D.sessions} يوماً قصيرة نسبياً — ما نفع في هذه الفترة قد لا ينفع لاحقاً.
    </div>

    <div class="sec">🏆 الأسهم مرتّبة حسب التوقع لكل صفقة</div>
    <button class="toggle" id="tg"></button>
    <div class="wrap"><table>
      <thead><tr>
        <th>السهم</th><th>صفقات</th><th>نسبة النجاح</th>
        <th>متوسط الربح</th><th>متوسط الخسارة</th><th>التوقع/صفقة</th><th>المجموع</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table></div>

    <div class="sec">📅 النتيجة حسب اليوم</div>
    <div class="wrap"><table>
      <thead><tr><th>التاريخ</th><th>صفقات</th><th>نسبة النجاح</th><th>مجموع النسب</th></tr></thead>
      <tbody>${D.by_day.slice().reverse().map(d=>`<tr>
        <td style="direction:ltr">${d.date}</td><td>${d.trades}</td>
        <td>${d.win_rate}%</td>
        <td class="${cls(d.total_pct)}">${pct(d.total_pct)}</td></tr>`).join("")}</tbody>
    </table></div>`;

  document.getElementById("tg").onclick=()=>{showAll=!showAll;rows();};
  rows();
}

function rows(){
  const list = showAll ? D.by_ticker : D.by_ticker.filter(r=>r.reliable);
  document.getElementById("tg").textContent =
    showAll ? `عرض الموثوقة فقط (٥ صفقات فأكثر)` : `عرض كل الأسهم (${D.by_ticker.length})`;
  document.getElementById("rows").innerHTML = list.map(r=>`<tr>
    <td class="tk">${r.ticker}${r.reliable?"":' <span class="muted">عيّنة صغيرة</span>'}</td>
    <td>${r.trades}</td>
    <td><div style="display:flex;align-items:center;gap:7px">
      <div class="bar"><i style="width:${Math.min(r.win_rate,100)}%"></i></div>
      <span>${r.win_rate}%</span></div></td>
    <td class="pos">${pct(r.avg_win)}</td>
    <td class="neg">${pct(r.avg_loss)}</td>
    <td class="${cls(r.expectancy)}">${r.expectancy>=0?"+":""}${r.expectancy.toFixed(3)}%</td>
    <td class="${cls(r.total_pct)}">${pct(r.total_pct)}</td></tr>`).join("");
}
</script>
</body>
</html>
