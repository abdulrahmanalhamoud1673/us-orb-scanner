<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080c15">
<title>فرص السوق الأمريكي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080c15;
    --card:#0f1523;
    --line:rgba(255,255,255,.07);
    --line2:rgba(255,255,255,.14);
    --text:#eef2f9;
    --muted:#8b97ae;
    --dim:#5a6478;
    --up:#12cf90;
    --down:#fb5573;
    --accent:#5b8dff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Tajawal",Tahoma,sans-serif;
    padding:clamp(16px,3vw,32px) clamp(14px,3vw,32px) 64px;
    max-width:1180px;margin:0 auto;
  }
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}

  /* ═══ الهيدر ═══ */
  header{margin-bottom:26px}
  h1{font-size:clamp(20px,3.4vw,25px);font-weight:800;letter-spacing:-.2px;margin-bottom:14px}
  .meta{display:flex;flex-wrap:wrap;gap:8px 22px;align-items:center;
        font-size:12.5px;color:var(--muted)}
  .meta b{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;direction:ltr}
  .state{display:inline-flex;align-items:center;gap:7px;font-weight:700}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--dim)}
  .dot.on{background:var(--up);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(18,207,144,.5)}70%{box-shadow:0 0 0 7px rgba(18,207,144,0)}}
  .state.open{color:var(--up)} .state.closed{color:var(--dim)}

  /* ═══ الملخص ═══ */
  .summary{display:flex;gap:26px;flex-wrap:wrap;margin:22px 0;
           padding:18px 22px;background:var(--card);border-radius:16px;border:1px solid var(--line)}
  .sm b{font-size:27px;font-weight:800;font-variant-numeric:tabular-nums;
        display:block;line-height:1.15}
  .sm small{color:var(--muted);font-size:12px}

  /* ═══ التبويبات ═══ */
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .tab{background:none;border:none;color:var(--muted);padding:8px 16px;
       border-radius:9px;cursor:pointer;font-size:13.5px;font-family:inherit;
       font-weight:600;transition:.15s}
  .tab:hover{color:var(--text);background:rgba(255,255,255,.045)}
  .tab.on{background:var(--accent);color:#fff;font-weight:700}

  /* ═══ البطاقات ═══ */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;
        padding:16px;cursor:pointer;transition:border-color .18s,transform .18s}
  .card:hover{border-color:var(--line2);transform:translateY(-2px)}
  .card:active{transform:scale(.99)}
  .row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
  .tkr{font-size:17px;font-weight:800;letter-spacing:.5px;direction:ltr}
  .tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px}
  .tag.buy{background:rgba(18,207,144,.13);color:var(--up)}
  .tag.sell{background:rgba(251,85,115,.13);color:var(--down)}
  .tag.flat{background:rgba(139,151,174,.11);color:var(--muted)}
  .px{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;direction:ltr;
      display:inline-block;padding:1px 5px;margin-inline-start:-5px;border-radius:6px;
      transition:background .5s,color .5s}
  .px.u{color:var(--up);background:rgba(18,207,144,.12)}
  .px.d{color:var(--down);background:rgba(251,85,115,.12)}
  .day{font-size:13px;font-weight:700;direction:ltr;font-variant-numeric:tabular-nums;
       margin-top:3px}
  .day.u{color:var(--up)} .day.d{color:var(--down)}
  .prog{display:flex;gap:3px;margin-top:14px}
  .prog i{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.09)}
  .prog i.on{background:var(--up)}

  .empty{grid-column:1/-1;text-align:center;padding:74px 20px;color:var(--muted);font-size:14px}
  .empty span{display:block;font-size:42px;margin-bottom:12px;opacity:.5}
  .empty small{display:block;margin-top:8px;color:var(--dim);font-size:12.5px}

  /* ═══ نافذة التفاصيل ═══ */
  .ov{position:fixed;inset:0;background:rgba(4,7,13,.8);z-index:90;
      display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
  .ov.on{display:flex;animation:fade .16s ease}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--card);border:1px solid var(--line2);border-radius:20px;
         width:min(480px,100%);margin:auto;padding:26px;position:relative;
         animation:rise .2s cubic-bezier(.3,1.2,.5,1)}
  @keyframes rise{from{transform:translateY(14px);opacity:0}}
  .x{position:absolute;top:16px;left:16px;background:none;border:none;color:var(--dim);
     font-size:22px;cursor:pointer;line-height:1;padding:4px;font-family:inherit;transition:.15s}
  .x:hover{color:var(--down)}
  .mtop{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
  .mtop .tkr{font-size:25px}
  .mtop a{margin-inline-start:auto;font-size:12px;color:var(--accent);text-decoration:none;font-weight:600}
  .mpx{font-size:38px;font-weight:800;direction:ltr;font-variant-numeric:tabular-nums;
       display:inline-block;padding:2px 7px;margin-inline-start:-7px;border-radius:9px;
       transition:background .5s,color .5s}
  .mpx.u{color:var(--up);background:rgba(18,207,144,.12)}
  .mpx.d{color:var(--down);background:rgba(251,85,115,.12)}

  .now{border-radius:12px;padding:14px 16px;margin:18px 0;font-size:13.5px;font-weight:700;
       text-align:center;line-height:1.7}
  .now.in{background:rgba(18,207,144,.1);color:var(--up)}
  .now.out{background:rgba(251,85,115,.1);color:var(--down)}
  .now.no{background:rgba(139,151,174,.08);color:var(--muted)}
  .now small{display:block;font-weight:500;font-size:11.5px;color:var(--muted);margin-top:4px}

  .levels{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px}
  .lv{border-radius:13px;padding:15px;text-align:center}
  .lv.b{background:rgba(18,207,144,.08)}
  .lv.s{background:rgba(251,85,115,.08)}
  .lv h4{font-size:11.5px;font-weight:700;margin-bottom:7px}
  .lv.b h4{color:var(--up)} .lv.s h4{color:var(--down)}
  .lv .n{font-size:21px;font-weight:800;direction:ltr;font-variant-numeric:tabular-nums}
  .lv p{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6}

  .h{font-size:12px;font-weight:700;color:var(--dim);margin:20px 0 10px;
     letter-spacing:.3px}
  .list{display:flex;flex-direction:column;gap:5px}
  .it{display:flex;align-items:center;gap:11px;font-size:12.5px;
      padding:10px 13px;border-radius:10px;background:rgba(255,255,255,.03)}
  .it.done{background:rgba(18,207,144,.09)}
  .it .i{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.08);
         display:grid;place-items:center;font-size:10.5px;font-weight:700;flex:none}
  .it.done .i{background:var(--up);color:#05231a}
  .it .v{font-weight:700;direction:ltr;font-variant-numeric:tabular-nums}
  .it .r{margin-inline-start:auto;color:var(--muted);font-size:11.5px;
         direction:ltr;font-variant-numeric:tabular-nums}
  .it.done .r{color:var(--up);font-weight:700}
  .k{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:5px}
  .k.b{background:rgba(18,207,144,.14);color:var(--up)}
  .k.s{background:rgba(251,85,115,.14);color:var(--down)}
  .t{color:var(--muted);direction:ltr;font-size:11.5px}

  footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);
         font-size:11.5px;color:var(--dim);line-height:1.9;text-align:center}

  @media(max-width:560px){
    .cards{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
    .card{padding:13px;border-radius:13px}
    .px{font-size:21px} .tkr{font-size:15.5px}
    .summary{gap:18px;padding:15px 17px}
    .sm b{font-size:22px}
    .levels{grid-template-columns:1fr}
    .modal{padding:20px;border-radius:17px}
    .mpx{font-size:31px}
    .ov{padding:10px}
  }
</style>
</head>
<body>

<header>
  <h1>فرص السوق الأمريكي</h1>
  <div class="meta">
    <span class="state" id="mkt"><span class="dot" id="dot"></span><span id="mktTxt">—</span></span>
    <span>الأردن <b id="cJo">--:--:--</b></span>
    <span>نيويورك <b id="cNy">--:--:--</b></span>
    <span id="scan">…</span>
  </div>
</header>

<div class="summary" id="sum"></div>

<div class="tabs">
  <button class="tab on" data-f="buy">إشارات شراء</button>
  <button class="tab" data-f="sell">خرجت</button>
  <button class="tab" data-f="all">كل الأسهم</button>
</div>

<div class="cards" id="cards"></div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<footer>
  الأسعار مباشرة · الإشارات تُحدَّث كل ٥ دقائق على إغلاق الشمعة<br>
  ⚠️ أداة تحليل فقط وليست توصية استثمارية
</footer>

<script>
"use strict";

/* ═══ الساعات وحالة السوق ═══ */
const fJo=new Intl.DateTimeFormat("en-GB",{timeZone:"Asia/Amman",hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
const fNy=new Intl.DateTimeFormat("en-GB",{timeZone:"America/New_York",hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
const fD =new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",weekday:"short",hour:"2-digit",minute:"2-digit",hour12:false});

function isOpen(){
  const p=Object.fromEntries(fD.formatToParts(new Date()).map(x=>[x.type,x.value]));
  if(p.weekday==="Sat"||p.weekday==="Sun") return false;
  const m=(+p.hour)*60+(+p.minute);
  return m>=570 && m<960;                      // 9:30 → 16:00
}
setInterval(()=>{
  const n=new Date();
  cJo.textContent=fJo.format(n); cNy.textContent=fNy.format(n);
  const o=isOpen();
  mktTxt.textContent=o?"السوق مفتوح":"السوق مغلق";
  mkt.className="state "+(o?"open":"closed");
  dot.className="dot"+(o?" on":"");
},1000);

/* ═══ الحالة ═══ */
let DATA=null, filter="buy", openTkr=null;
const live={}, els={};
let mEls=null;

const money=n=>"$"+Number(n).toFixed(2);
const pct  =n=>(n>=0?"+":"")+Number(n).toFixed(2)+"%";
const byT  =t=>DATA.all.find(r=>r.ticker===t);

/* ═══ تحميل نتائج الاستراتيجية ═══ */
async function load(){
  try{
    const r=await fetch("results.json?v="+Date.now(),{cache:"no-store"});
    DATA=await r.json(); draw(); subscribe();
    if(openTkr) detail(openTkr);
  }catch(e){ scan.textContent="⚠️ تعذّر تحميل الإشارات"; }
}
setInterval(load,45000);

function draw(){
  const d=DATA;
  const ago=Math.max(0,Math.round((Date.now()-Date.parse(d.updated_ny.replace(" ","T")+"-04:00"))/60000));
  scan.textContent=`آخر فحص قبل ${isFinite(ago)?ago:"?"} دقيقة`;

  sum.innerHTML=`
    <div class="sm"><b style="color:var(--up)">${d.buy_count}</b><small>إشارة شراء نشطة</small></div>
    <div class="sm"><b style="color:var(--down)">${d.sell_count}</b><small>خرجت من الصفقة</small></div>
    <div class="sm"><b>${d.scanned}</b><small>سهم مفحوص</small></div>`;

  let list=d.all;
  if(filter==="buy")  list=d.opportunities;
  if(filter==="sell") list=d.all.filter(r=>r.state===-1);

  for(const k in els) delete els[k];

  if(!list.length){
    cards.innerHTML=`<div class="empty"><span>◎</span>لا توجد إشارات في هذا القسم
      <small>الإشارات تظهر بعد إغلاق الشموع التالية لشمعة الافتتاح</small></div>`;
    return;
  }

  cards.innerHTML=list.map(r=>{
    const tag=r.state===1?["buy","شراء"]:r.state===-1?["sell","خرج"]:["flat","ترقّب"];
    const bars=r.targets.map((t,i)=>`<i class="${i<r.targets_hit?"on":""}"></i>`).join("");
    return `<div class="card" data-t="${r.ticker}">
      <div class="row1">
        <span class="tkr">${r.ticker}</span>
        <span class="tag ${tag[0]}">${tag[1]}</span>
      </div>
      <div class="px" id="p-${r.ticker}">${money(r.price)}</div>
      <div class="day ${r.day_change_pct>=0?"u":"d"}" id="c-${r.ticker}">${pct(r.day_change_pct)}</div>
      <div class="prog">${bars}</div>
    </div>`;
  }).join("");

  list.forEach(r=>{
    els[r.ticker]={p:document.getElementById("p-"+r.ticker),
                   c:document.getElementById("c-"+r.ticker),
                   last:live[r.ticker]?.price ?? r.price};
    if(live[r.ticker]) paint(r.ticker,live[r.ticker],false);
  });
}

cards.onclick=e=>{ const c=e.target.closest("[data-t]"); if(c) detail(c.dataset.t); };
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); filter=t.dataset.f; draw();
});

/* ═══ نافذة التفاصيل — كل رقم فيها من نتائج الاستراتيجية كما هي ═══ */
function detail(tk){
  const r=byT(tk); if(!r) return;
  openTkr=tk;
  const px=live[tk]?.price ?? r.price;

  const now = r.state===1
    ? `<div class="now in">إشارة شراء نشطة<small>دخلت عند ${money(r.entry_price)} الساعة ${r.last_signal_time} بتوقيت نيويورك</small></div>`
    : r.state===-1
    ? `<div class="now out">خرجت من الصفقة<small>آخر خروج الساعة ${r.last_signal_time} — بانتظار إشارة دخول جديدة</small></div>`
    : `<div class="now no">لا توجد إشارة<small>لم يتحقق شرط الدخول في جلسة اليوم</small></div>`;

  const tgs=r.targets.map((t,i)=>{
    const hit=i<r.targets_hit;
    return `<div class="it ${hit?"done":""}">
      <span class="i">${hit?"✓":i+1}</span>
      <span class="v">${money(t)}</span>
      <span class="r">${hit?"تحقق":"باقي "+((t/px-1)*100).toFixed(2)+"%"}</span></div>`;
  }).join("");

  const log=r.signals.length
    ? r.signals.slice().reverse().map(s=>`<div class="it">
        <span class="k ${s.kind==="Buy"?"b":"s"}">${s.kind==="Buy"?"دخول":"خروج"}</span>
        <span class="t">${s.time}</span>
        <span class="r" style="color:var(--text);font-weight:700">${money(s.price)}</span></div>`).join("")
    : `<div class="it" style="color:var(--muted)">لا توجد إشارات اليوم</div>`;

  modal.innerHTML=`
    <button class="x" id="mx">✕</button>
    <div class="mtop">
      <span class="tkr">${tk}</span>
      <a href="https://www.tradingview.com/chart/?symbol=${tk}" target="_blank" rel="noopener">الشارت ↗</a>
    </div>
    <div><span class="mpx" id="mp">${money(px)}</span>
         <span class="day ${r.day_change_pct>=0?"u":"d"}" id="mc"
               style="display:inline-block;margin-inline-start:8px">${pct(r.day_change_pct)}</span></div>
    ${now}
    <div class="levels">
      <div class="lv b"><h4>مستوى الشراء</h4><div class="n">${money(r.open_high)}</div>
        <p>قمة شمعة الافتتاح — الدخول عند إغلاق شمعة فوقها وفوق ${money(r.vwap)}</p></div>
      <div class="lv s"><h4>مستوى الخروج</h4><div class="n">${money(r.vwap)}</div>
        <p>VWAP — الخروج عند إغلاق شمعة تحته</p></div>
    </div>
    <div class="h">الأهداف</div>
    <div class="list" id="tg">${tgs}</div>
    <div class="h">إشارات اليوم</div>
    <div class="list">${log}</div>`;

  ov.classList.add("on"); document.body.style.overflow="hidden";
  mEls={p:document.getElementById("mp"),c:document.getElementById("mc"),last:px};
  if(live[tk]) paintM(live[tk],false);
  document.getElementById("mx").onclick=close;
}
function close(){ ov.classList.remove("on"); document.body.style.overflow=""; openTkr=null; mEls=null; }
ov.onclick=e=>{ if(e.target===ov) close(); };
addEventListener("keydown",e=>{ if(e.key==="Escape"&&openTkr) close(); });

/* ═══ البث المباشر للأسعار ═══ */
let ws=null, retry=2000;

/* فكّ ترميز رسالة ياهو (protobuf): 1=الرمز، 2=السعر، 8=تغيّر٪ */
function decode(b64){
  const raw=atob(b64), buf=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) buf[i]=raw.charCodeAt(i);
  let pos=0; const out={};
  const vi=()=>{let r=0n,s=0n;for(;;){const b=buf[pos++];r|=BigInt(b&127)<<s;if(!(b&128))return r;s+=7n;if(pos>buf.length)throw 0;}};
  while(pos<buf.length){
    const tag=Number(vi()), f=tag>>3, w=tag&7;
    if(w===0) vi();
    else if(w===1) pos+=8;
    else if(w===5){ const v=new DataView(buf.buffer,pos,4).getFloat32(0,true); pos+=4;
      if(f===2)out.price=v; else if(f===8)out.chg=v; }
    else if(w===2){ const n=Number(vi());
      if(f===1) out.id=new TextDecoder().decode(buf.subarray(pos,pos+n));
      pos+=n; }
    else break;
  }
  return out;
}
const timers={};
function flash(el,dir,key){
  if(!dir) return;
  el.classList.remove("u","d"); void el.offsetWidth;
  el.classList.add(dir>0?"u":"d");
  clearTimeout(timers[key]); timers[key]=setTimeout(()=>el.classList.remove("u","d"),550);
}
function paint(id,q,fl=true){
  const e=els[id]; if(!e) return;
  const dir=q.price>e.last?1:q.price<e.last?-1:0; e.last=q.price;
  e.p.textContent=money(q.price);
  if(fl) flash(e.p,dir,"c"+id);
  if(q.chg!==undefined){ e.c.textContent=pct(q.chg); e.c.className="day "+(q.chg>=0?"u":"d"); }
}
function paintM(q,fl=true){
  if(!mEls) return;
  const dir=q.price>mEls.last?1:q.price<mEls.last?-1:0; mEls.last=q.price;
  mEls.p.textContent=money(q.price);
  if(fl) flash(mEls.p,dir,"m");
  if(q.chg!==undefined){ mEls.c.textContent=pct(q.chg); mEls.c.className="day "+(q.chg>=0?"u":"d"); }
  const r=byT(openTkr); if(!r) return;
  document.querySelectorAll("#tg .it").forEach((el,i)=>{
    if(el.classList.contains("done")) return;
    const rr=el.querySelector(".r");
    if(rr) rr.textContent="باقي "+((r.targets[i]/q.price-1)*100).toFixed(2)+"%";
  });
}
function subscribe(){
  if(ws&&ws.readyState===1&&DATA) ws.send(JSON.stringify({subscribe:DATA.all.map(r=>r.ticker)}));
}
function connect(){
  try{ ws=new WebSocket("wss://streamer.finance.yahoo.com/?version=2"); }catch(e){ return; }
  ws.onopen=()=>{ retry=2000; subscribe(); };
  ws.onmessage=ev=>{
    try{
      let b=ev.data;
      if(typeof b==="string"&&b[0]==="{"){ const j=JSON.parse(b); b=j.message||j.data||""; }
      if(!b) return;
      const q=decode(b);
      if(q.id&&q.price){ live[q.id]={price:q.price,chg:q.chg};
        paint(q.id,live[q.id]); if(q.id===openTkr) paintM(live[q.id]); }
    }catch(e){}
  };
  ws.onclose=()=>{ setTimeout(connect,retry); retry=Math.min(retry*2,30000); };
  ws.onerror=()=>ws.close();
}

load(); connect();
</script>
</body>
</html>
