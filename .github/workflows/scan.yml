name: فحص السوق الأمريكي

on:
  schedule:
    # جدولة جيت هَب المجانية "أفضل جهد": تتأخّر أو تُلغى عند بداية كل ساعة
    # (وقت الضغط العالي)، لذلك نتجنّب الدقيقة 00 ونوزّع على دقائق فردية.
    # يغطي جلسة نيويورك 9:30–16:00 (13:30–20:00 UTC صيفاً / 14:30–21:00 شتاءً).
    - cron: "3,9,15,21,27,33,39,45,51,57 13-21 * * 1-5"
  workflow_dispatch: # التشغيل اليدوي من تبويب Actions

# مطلوب حتى يستطيع الـ workflow حفظ النتائج في المستودع
permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false # لا نلغي فحصاً جارياً، ننتظره

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: تشغيل السكانر
        run: python scan.py

      - name: جلب أخبار السوق
        # فشل الأخبار يجب ألا يوقف نشر نتائج الفحص
        continue-on-error: true
        run: python news.py

      - name: حفظ النتائج
        run: |
          git config user.name  "orb-scanner-bot"
          git config user.email "bot@users.noreply.github.com"
          # -f لأن الملفات مُتجاهَلة محلياً (حتى لا تدهس تجربةٌ محلية نتائج السحابة)
          git add -f docs/results.json docs/news.json
          # --quiet يرجع 0 إذا لا يوجد تغيير، فنتخطى الـ commit
          git diff --staged --quiet && echo "لا تغييرات" && exit 0
          git commit -m "تحديث النتائج $(date -u '+%Y-%m-%d %H:%M UTC')"
          # إعادة المحاولة: قد يكون تشغيل آخر سبقنا بالدفع
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push
